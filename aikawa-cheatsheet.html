let filter = 'all';
function setFilter(f, el) {
  filter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}
function toggle(el) {
  const d = el.querySelector('.detail');
  if (d) d.classList.toggle('open');
}

function nl2br(s) { return s ? s.replace(/\n/g, '<br>') : ''; }

function render() {
  const list = document.getElementById('list');
  list.innerHTML = '';
  let cnt = 0;
  const order = {S:0, A:1, B:2};
  const sorted = [...people].sort((a,b) => {
    const td = (order[a.tier]||2) - (order[b.tier]||2);
    return td !== 0 ? td : b.stars - a.stars;
  });

  let lastCat = '';
  for (const p of sorted) {
    if (filter !== 'all') {
      if (filter === 'kanryo' && p.cat !== 'kanryo') continue;
      if (filter === 'giin'   && p.cat !== 'giin')   continue;
      if (filter === 's'      && p.tier !== 'S')      continue;
      if (filter === 'pitch'  && p.sub  !== 'pitch')  continue;
    }

    const catLabel = p.cat === 'kanryo' ? '🏛️ 官僚' : '🗳️ 議員';
    if (filter === 'all' && catLabel !== lastCat) {
      const lbl = document.createElement('div');
      lbl.className = 'section-label';
      lbl.textContent = catLabel;
      list.appendChild(lbl);
      lastCat = catLabel;
    }

    cnt++;
    const card = document.createElement('div');
    card.className = `card tier-${p.tier}`;
    card.onclick = () => toggle(card);

    const stars = '★'.repeat(p.stars) + '☆'.repeat(5 - p.stars);
    const catClass = p.cat === 'kanryo' ? 'cat-kanryo' : 'cat-giin';
    const catText  = p.cat === 'kanryo' ? '官僚' : '議員';

    card.innerHTML = `
      <div class="card-top">
        <div class="photo-wrap">
          <img class="photo tier-${p.tier}" src="${p.photo}" alt="${p.name}"
               onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2272%22 height=%2272%22><rect fill=%22%232a1600%22 width=%2272%22 height=%2272%22 rx=%2236%22/><text x=%2236%22 y=%2244%22 text-anchor=%22middle%22 font-size=%2226%22 fill=%22%23F18900%22>${p.name[0]}</text></svg>'">
          <div class="badge-wrap"><span class="tier-badge ${p.tier}">${p.tier}</span></div>
        </div>
        <div class="info">
          <div class="name">${p.name} <span class="stars">${p.tier === 'S' ? stars : ''}</span></div>
          <div class="org">${p.org}</div>
          <div class="role-text">${p.role}</div>
          <span class="cat-tag ${catClass}">${catText}</span>
          ${p.sub === 'pitch' ? '<span class="cat-tag cat-pitch" style="margin-left:4px">Pitch共演</span>' : ''}
        </div>
      </div>
      <div class="detail">
        ${p.age ? `<div class="d-section"><div class="d-label">年齢</div><div class="d-text">${p.age}</div></div>` : ''}
        ${p.edu ? `<div class="d-section"><div class="d-label">学歴</div><div class="d-text">${p.edu}</div></div>` : ''}
        <div class="d-section"><div class="d-label">経歴</div><div class="d-text">${p.career}</div></div>
        <div class="box box-rimo">
          <div class="blabel">💡 Rimoとの接続点</div>
          <div class="btext">${p.rimo}</div>
        </div>
        <div class="box box-gov">
          <div class="blabel">🏛️ 政府権限・会議体</div>
          <div class="btext">${p.gov}</div>
        </div>
        <div class="box box-hot">
          <div class="blabel">🔥 今この人が燃えていること</div>
          <div class="btext">${nl2br(p.hotTopic)}</div>
        </div>
        <div class="box box-ice">
          <div class="blabel">🧊 アイスブレイク（最強の一言）</div>
          <div class="btext">${nl2br(p.icebreaker)}</div>
        </div>
        <div class="box box-pers">
          <div class="blabel">🎭 人間的な側面・プライベート</div>
          <div class="btext">${nl2br(p.personal)}</div>
        </div>
        <div class="box box-mine">
          <div class="blabel">⚠️ 地雷・絶対NG</div>
          <div class="btext">${nl2br(p.landmine)}</div>
        </div>
        <div class="box box-script">
          <div class="blabel">💬 会話台本（コピペ可）</div>
          <div class="btext">${nl2br(p.script)}</div>
        </div>
        <div class="box box-talk">
          <div class="blabel">🗣️ 話すべきこと（ミッション軸）</div>
          <div class="btext">${nl2br(p.talk)}</div>
        </div>
        <div class="box box-invite">
          <div class="blabel">🎯 会議体・諮問委員会への接続戦略</div>
          <div class="btext">${nl2br(p.invite)}</div>
        </div>
        <div class="box box-action">
          <div class="blabel">⚡ 当日アクション</div>
          <div class="btext">${p.action}</div>
        </div>
        <div class="box box-src">
          <div class="blabel">🔗 出典URL（タップで開く）</div>
          <div class="btext">${nl2br(p.sources)}</div>
        </div>
      </div>
    `;
    list.appendChild(card);
  }
  document.getElementById('cnt').textContent = `${cnt}名表示`;
}

render();
</script>
