function setFilter(f, el) {
  filter = f;

}

function onSearch(q) {
  searchQ = q.trim();
  document.getElementById('search-clear').style.display = searchQ ? 'inline' : 'none';
  render();
}

function clearSearch() {
  const inp = document.getElementById('search-input');
  inp.value = '';
  searchQ = '';
  document.getElementById('search-clear').style.display = 'none';
  render();
  inp.focus();
}

function matchSearch(p) {
  if (!searchQ) return true;
  const q = searchQ.toLowerCase();
  const hay = [p.name, p.org, p.role, p.career, p.hotTopic, p.icebreaker,
    p.personal, p.script, p.talk, p.invite, p.action, p.rimo, p.gov, p.landmine].join(' ').toLowerCase();
  return hay.includes(q);
}

function srcPills(arr) {
  if (!arr || !arr.length) return '';
  return `<div class="src-pills">${arr.map(([url, lbl]) => `<a class="src-pill" href="${url}" target="_blank">${lbl}</a>`).join('')}</div>`;
}

function renderSchedule() {
  const list = document.getElementById('list');
  list.innerHTML = '';
  document.getElementById('cnt').textContent = `${schedule.length}件`;
  for (const s of schedule) {
    const item = document.createElement('div');
    item.className = 'sched-item' + (s.flag ? ' sched-key' : '');
    const who = s.who.length ? `<div class="sched-who">${s.who.map(w => `<span class="sched-tag ${w.cat}">${w.name}</span>`).join('')}</div>` : '';
    item.innerHTML = `<div class="sched-time">${s.time}</div><div class="sched-body"><div class="sched-label">${s.label}</div>${s.note ? `<div class="sched-note">${s.note}</div>` : ''}${who}</div>`;
    list.appendChild(item);
  }
}

function render() {
  if (filter === 'schedule') { renderSchedule(); return; }
  const list = document.getElementById('list');
  list.innerHTML = '';
  let cnt = 0;
  const order = { S: 0, A: 1, B: 2 };
  const sorted = [...people].sort((a, b) => {
    const td = (order[a.tier] || 2) - (order[b.tier] || 2);
    return td !== 0 ? td : b.stars - a.stars;
  });
  let lastCat = '';
  for (const p of sorted) {
    if (!matchSearch(p)) continue;
    if (!searchQ) {
      if (filter === 'kanryo' && p.cat !== 'kanryo') continue;
      if (filter === 'giin'   && p.cat !== 'giin')   continue;
      if (filter === 'key'    && p.tier !== 'S')      continue;
    }
    cnt++;
    const catLabel = p.cat === 'kanryo' ? '🏛️ 官僚' : '🗳️ 議員・大臣';
    if (filter === 'all' && catLabel !== lastCat) {
      const lbl = document.createElement('div');
      lbl.className = 'section-label';
      lbl.textContent = catLabel;
      list.appendChild(lbl);
      lastCat = catLabel;
    }
    const card = document.createElement('div');
    card.className = `card cat-${p.cat}`;
    card.onclick = () => toggle(card);
    const catClass = p.cat === 'kanryo' ? 'tag-kanryo' : 'tag-giin';
    const catText  = p.cat === 'kanryo' ? '🏛️ 官僚' : '🗳️ 議員・大臣';
    card.innerHTML = `
      <div class="card-top">
        <div class="photo-wrap">
          <img class="photo cat-${p.cat}" src="${p.photo}" alt="${p.name}"
               style="${p.photoCrop ? 'object-position:' + p.photoCrop : ''}"
               onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2272%22 height=%2272%22><rect fill=%22%232a1600%22 width=%2272%22 height=%2272%22 rx=%2236%22/><text x=%2236%22 y=%2244%22 text-anchor=%22middle%22 font-size=%2226%22 fill=%22%23F18900%22>${p.name[0]}</text></svg>'">
        </div>
        <div class="info">
          <div class="name">${p.name}</div>
          <div class="org">${p.org}</div>
          <div class="role-text">${p.role}</div>
          <span class="cat-tag ${catClass}">${catText}</span>
        </div>
      </div>
      <div class="detail">
        ${p.age ? `<div class="d-section"><div class="d-label">年齢</div><div class="d-text">${p.age}</div></div>` : ''}
        ${p.edu ? `<div class="d-section"><div class="d-label">学歴</div><div class="d-text">${p.edu}</div></div>` : ''}
        <div class="d-section"><div class="d-label">経歴</div><div class="d-text">${p.career}</div></div>
        <div class="box box-rimo"><div class="blabel">💡 Rimoとの接続点</div><div class="btext">${p.rimo}</div></div>
        <div class="box box-gov"><div class="blabel">🏛️ 政府権限・会議体</div><div class="btext">${p.gov}</div></div>
        <div class="box box-hot"><div class="blabel">🔥 今燃えていること</div><div class="btext">${nl2br(p.hotTopic)}</div></div>
        ${srcPills(p.srcHot)}
        <div class="box box-ice"><div class="blabel">🧊 アイスブレイク</div><div class="btext">${nl2br(p.icebreaker)}</div></div>
        <div class="box box-pers"><div class="blabel">🎭 人間的な側面・プライベート</div><div class="btext">${nl2br(p.personal)}</div></div>
        ${srcPills(p.srcPers)}
        <div class="box box-mine"><div class="blabel">⚠️ 地雷・絶対NG</div><div class="btext">${nl2br(p.landmine)}</div></div>
        <div class="box box-script"><div class="blabel">💬 会話一例</div><div class="btext">${nl2br(p.script)}</div></div>
        <div class="box box-talk"><div class="blabel">🗣️ 話すべきこと（ミッション軸）</div><div class="btext">${nl2br(p.talk)}</div></div>
        <div class="box box-invite"><div class="blabel">🎯 会議体・諮問委員会への接続戦略</div><div class="btext">${nl2br(p.invite)}</div></div>
        <div class="box box-action"><div class="blabel">⚡ 当日アクション</div><div class="btext">${p.action}</div></div>
      </div>`;
    list.appendChild(card);
  }
  document.getElementById('cnt').textContent = searchQ ? `🔍 "${searchQ}" — ${cnt}件ヒット` : `${cnt}名表示`;
}
render();
</script>
</body>
</html>
